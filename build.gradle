tasks.register('testQuick') {
    group = 'verification'
    description = 'Run unit and network integration tests only (fast ~10-20s)'
    dependsOn test, integrationTest

    doLast {
        println ''
        println '✓ Quick tests completed (unit + network integration)'
    }
}

